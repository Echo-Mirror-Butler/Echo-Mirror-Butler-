name: CI

on:
  pull_request:
    branches: [main, development]

jobs:
  flutter-ci:
    name: Format · Analyze · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Only format Flutter/Dart app files — the server package (echomirror_server/)
      # uses its own analysis_options and is not a Flutter project.
      - name: Check formatting
        run: dart format --set-exit-if-changed lib test backend

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests with coverage
        run: flutter test --exclude-tags integration --coverage

      - name: Check coverage threshold
        run: |
          LCOV_FILE="coverage/lcov.info"

          if [ ! -f "$LCOV_FILE" ]; then
            echo "Coverage file not found at $LCOV_FILE"
            exit 1
          fi

          # Sum up all lines found (LF) and lines hit (LH) across the report
          TOTAL_LINES=$(grep -h "^LF:" "$LCOV_FILE" | cut -d: -f2 | paste -sd+ - | bc)
          COVERED_LINES=$(grep -h "^LH:" "$LCOV_FILE" | cut -d: -f2 | paste -sd+ - | bc)

          if [ -z "$TOTAL_LINES" ] || [ -z "$COVERED_LINES" ] || [ "$TOTAL_LINES" -eq 0 ]; then
            echo "No executable lines found in coverage report. Marking coverage as 0%."
            COVERAGE=0
          else
            COVERAGE=$(awk "BEGIN { printf \"%.2f\", ($COVERED_LINES / $TOTAL_LINES) * 100 }")
          fi

          echo "Total lines:   $TOTAL_LINES"
          echo "Covered lines: $COVERED_LINES"
          echo "Coverage:      $COVERAGE%"

          THRESHOLD=40

          # Fail the build if coverage drops below the threshold
          if awk "BEGIN { exit !($COVERAGE < $THRESHOLD) }"; then
            echo "Coverage $COVERAGE% is below minimum threshold of ${THRESHOLD}%"
            exit 1
          fi

          echo "Coverage $COVERAGE% meets minimum threshold of ${THRESHOLD}%"
